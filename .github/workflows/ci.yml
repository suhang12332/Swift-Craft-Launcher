name: CI

on:
  pull_request:
    branches: [main, master, dev]
  push:
    branches: [main, master, dev]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: macos-26

    steps:
      # =========================
      # Checkout
      # =========================
      - name: Checkout code
        uses: actions/checkout@v6

      # =========================
      # Xcode
      # =========================
      - name: Setup Xcode
        uses: JohnTitor/setup-xcode@v0.1.1
        with:
          xcode-version: latest-stable

      # =========================
      # SwiftLint
      # =========================
      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        run: swiftlint lint --strict

      # =========================
      # SwiftFormat
      # =========================
      - name: Install SwiftFormat 0.61.1
        run: |
          curl -sL https://github.com/nicklockwood/SwiftFormat/releases/download/0.61.1/swiftformat.zip -o swiftformat.zip
          unzip -o swiftformat.zip -d /usr/local/bin
          chmod +x /usr/local/bin/swiftformat
          swiftformat --version

      - name: Run SwiftFormat lint
        run: |
          output=$(swiftformat . --swift-version 6.1 2>&1)
          echo "$output"
          formatted=$(echo "$output" | grep -oE '[0-9]+/[0-9]+ files formatted' | grep -oE '^[0-9]+')
          if [ "$formatted" -gt 0 ]; then
            echo "❌ $formatted file(s) were formatted. Please run 'swiftformat .' locally and commit."
            exit 1
          fi

      # =========================
      # Code Rules Check
      # =========================
      - name: Check code rules
        run: python3 .github/scripts/check_code_rules.py || { echo "::error::Code rules check failed — fix violations before pushing."; exit 1; }

      # =========================
      # Localization Check
      # =========================
      - name: Check localization completeness
        run: python3 .github/scripts/check_localization.py || { echo "::error::Localization check failed — fix before pushing."; exit 1; }

      # =========================
      # Run Tests
      # =========================
      - name: Run unit tests
        run: |
          set -o pipefail
          xcodebuild test \
            -project SwiftCraftLauncher.xcodeproj \
            -scheme SwiftCraftLauncher \
            -destination 'platform=macOS' \
            -skipPackagePluginValidation \
            CODE_SIGNING_ALLOWED=NO \
            -resultBundlePath TestResults.xcresult | tee xcodebuild.log

      # =========================
      # HTML Report
      # =========================
      - name: Generate HTML report
        if: always()
        run: |
          brew install xcresultparser
          xcresultparser -o html TestResults.xcresult > report.html

      # =========================
      # PDF Report
      # =========================
      - name: Generate PDF report
        if: always()
        run: |
          "/Applications/Google Chrome.app/Contents/MacOS/Google Chrome" \
            --headless \
            --disable-gpu \
            --print-to-pdf=report.pdf \
            report.html

      # =========================
      # Export Attachments
      # =========================
      - name: Export test attachments
        if: always()
        run: |
          mkdir -p attachments
          xcrun xcresulttool export attachments \
            --path TestResults.xcresult \
            --output-path attachments || true

      # =========================
      # Upload HTML + PDF
      # =========================
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-report
          path: |
            report.html
            report.pdf
          retention-days: 30

      # =========================
      # Upload screenshots
      # =========================
      - name: Upload attachments
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-attachments
          path: attachments
          retention-days: 30

      # =========================
      # Upload xcresult (fail only)
      # =========================
      - name: Upload xcresult
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: xcresult
          path: TestResults.xcresult
          retention-days: 7

      # =========================
      # Upload logs
      # =========================
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: xcodebuild-log
          path: xcodebuild.log
          retention-days: 7
